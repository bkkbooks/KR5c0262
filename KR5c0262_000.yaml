body:
  text: 年用周天一年四次行春分日用震卦八十一仲春時在卯進火發青陽陽數終九九三返用為良夏至日用離卦七十二夏至時當午南觀四六功數分七十二關節自然通秋分日用兊卦九十九秋分居酉位西向發神光九十加九數三返氣才昌冬至日用坎卦一百八冬至陽生子行功坐北方數成一百八四九可能詳行功訣曰望王相地隨時而坐春分日卯時面東望太陽坐夏至日午時面南望太陽坐秋分日酉時面西望太隂坐如不現即存想如見真形冬至日用坎卦子時面北望太隂坐如上法握固存神靜慮叩齒三十六通天鼓二十四下晝望太陽夜望太隂念呪太陽呪曰太陽流精來保吾身吾胎巳靈同合其真急急如律令太隂呪曰太隂匡精為我胎靈安其魂魂永集至神急急如律令每念呪一遍取氣一口隨吸入便縮息閉氣定數滿足一口氣作三咽念呪三遍取氣三次一如上法了便義雙手擦丹田熱即止為一用月用周天一月一次行月者地𩲸太隂水之精在下為卑位屬坤巽冬王夏衰晝短夜長中隱陽精內隱玉兔兔者卯也以應東方草木能生其火隂中有隱陽內境曰下焦為地五臟曰腎兩腎中曰丹田前有巽海即人之水府其位雖隂中含其陽八卦曰坎坎者陷也受水之府故江湖歸矣世俗之徒不知隂陽正位只以北方為坎南方為離此理皆非坎者南方坤巽之位也坎中竒陽者即南才午之火也離者北方乾艮之位也離中偶隂者即北方亥于之水也月者外隂而內陽外小人而內君子亦內如鉛錫中産白銀砂石之中包赤金金之與銀俱是隂中有陽謂之嬰兒上與丹砂之中太隂姹女合為夫婦情類相戀凝而成砂坎為水海隱龍之宫亦喻帝王至尊位處北闕面南稱尊月者地也地無陽氣萬物不生禀天地而生萬物向陽而長此者天地常道矣夫處世為人先遵乎至道後順乎天道順天之道也常存其身中元陽真一太和純粹自然之氣自致長生久視故周天之用列於三十日中一十二月卦計隂陽爻合為七十二數加五行為用故成三百六十之數陽進隂退周而復始十一月地雷復卦癸酉癸亥癸庚庚辰庚寅庚子金水土土木水火十數水二十數復卦初見一陽爻坎男離女正當驕滿堂金玉乾坤耀透出霞光萬丈髙十二月地澤臨卦癸酉癸亥癸丑丁丑丁卯丁巳金水土土木火火十一水十九九二生兹見節候陽質漸漸轉相偷此名大吕名臨卦轉換身輕永不憂正月地天泰卦癸酉癸亥癸丑甲辰甲寅甲子金水土土木水火十二水十八地天奉卦三陽寧三花既艷定長生我今修得明珠寶九重城裹有誰爭二月雷天大壯卦庚戌庚甲庚午甲辰甲寅甲子土金火土木水火十三水十七神室安爐大壯號卯酉門中龍虎嘯天地開閉審細分還丹漸漸燒成寶三月澤天夬卦丁未丁酉丁亥甲辰甲寅甲子土金水土木水火十四水十六五九交交以盛陽透出光輝見瑞祥既然功至逍遙地便見無為不死鄉四月六陽乾卦壬戌壬申壬午甲辰甲寅甲子土金火土木水火十五水十五退盡隂爻見六陽天符到此火飛光周天到日出東甲金鼎丹砂藥自昌五月天風姤卦壬戌壬申壬午辛酉辛亥辛丑土金火金水土水十火二十天風姤卦一隂生爐中白雪漸飛升瓊花初放中宫産天鼎流珠藥自增六月天山遁卦壬戊壬中壬午兩中內午內辰土金火金火土水十一火十九二六循還藥可收姹女因媒轉更修冝下周天功力大五行皆㑹在中洲七月天地否卦壬戌壬甲壬午乙卯乙己乙來土金火木火土水十二火十八三陽才退覆三隂鼎內丹砂雪色深升降符合天地否九還燒就水中金八月風地觀卦辛卯辛巳事未乙卯乙巳乙未木火土木火土水十三火十七陽減隂加四六間龍強虎踊過天關九光霞散風雲㑹一泒銀波雪浪寒九月山地剝卦一丙寅丙子丙戌乙卯乙巳乙未木水土木火土水十四火十六陽爻一位敵隂符剝盡輕清重濁居從此斗杓方建戌㑹觀天道入仙都十月六隂坤卦癸酉癸亥癸丑乙卯乙巳乙未金水土木火土水十五火十五坤象隂符第一篇始知鉛汞作還丹如雞抱卵胎仙化玉霄更骨出凡間行功訣曰凡卦行金以兩腎相交先以左足壓右却以右壓左緊叉手兩手握於手心無令轉動逆日轉十二遭順日轉十三遭轆轤三轉運氣入腦凡卦行水以舌於牙齒外面著力緊轉先以向左轉十二遭次以向右轉十三遭漱至甘甜咽凡卦行木合口鼓腮十二鼓水滿口即咽凡卦行火閉氣數息候氣急即併三咽之行久閉氣息漸加數即約百息止凡卦行土先行火次水次木次金轆轤運至中脘定住以左手按之九轉每月月盡日夜三更先行了本月卦象次更行前項逐月水火數叩齒天鼓握固存神一如年用日用周天一日行一卦須午前天地配象乾坤建爻爻象符合水火進退水加火減陽卷隂舒盡在六十四爻之內以乾坤為鼎器坎離為藥爐屯䝉為始既未為終以晦朔為綱紀胎息成火符周天之數一月為滿如蟻循還周而復始參同契云火記六百篇所趣等不殊文字鄭重出俗人不熟思修內丹者先正其爐爐為鼎之外垣即人身體是也中有長生藥者即神氣精液爐分八門者即眼耳口鼻也為視聽吐納之關是橐籥開閉之門户運動各取其冝常令固守勿使形色滋味八邪六賊傷於內真然可行功矣地爐中造化故列丹爐下項一日水雷屯卦腎傳肝戊子戊戌戊中庚辰庚寅俺子水土金金火土二日水天需卦腎傳大腸戌子戊戌戌中甲辰中寅甲子水土金土木水三日地水師卦小腸傳腎癸酉癸亥癸丑戊午戊辰戊寅金水土大土木四日風天小畜卦膽傳大腸辛卯辛巳辛未甲辰甲寅甲子木大土土木水五日地天泰卦小腸傳大腸癸酉癸亥癸丑甲辰甲寅甲子金水土土木水六日天火同人卦大腸傳心壬戌壬甲壬午乙卯乙己乙