front:
  text: 太清元極至妙神珠玉顆經薄三道言八景飛揚玄虛洞光神珠玉顆太隂太陽開天記云神珠者太陽之精玉顆者月華之英朝魂主降暮𩲸主升朝魂者天之陽魂暮𩲸者地之隂𩲸隂𩲸升時陽魂降應飛光八境發生四象萬物兆萌應節順時動合變化皆因天象盡於無中變有有內化無太陽流珠主人之陽也太隂玄珠主人之隂也隂陽符合沖和應用然後白金施紅雪配精血住真胎結始孕男女夫男子者應天之尊氣女子者應地之卑氣兒女符合而生隂陽俯仰而降始為一氣而化五行而用方得三田並位五氣開圖順四時而長四肢定八方而隨八卦隂陽府藏皆象夫地豈不因氣候而生豈不因造化而立至於人之修養亦依天地同徒欲鍊大藥金丹不離隂陽造化須憑周天應用甲子運移爻象減加火符進退陽生復內隂發遘中定否泰於寅申進乾坤於巳亥火加水減隂卷陽舒運九還合金木之爻轉七返在水火之象真氣一十六兩布在三百八十四爻之中大藥火候一斤分於周易六十四卦之內須得君臣定位夫婦同和主客尊卑皆隨火候尺寸與銖兩皆同升斗與爻辭不異列夭地五十五數皆在爐中分晝夜一百刻中盡在鼎內水中白虎感月𩲸而成形火內青龍含日光而應象鍊藥須分四序進火全在八門三光氣會煎熬百道紅漿十二樓前煆鍊一池白雪轉八瓊於脊腠之道運一氣上泥丸之宫玄珠落處池中開一朵紫金蓮聖石飛來鼎內長萬道白玉笋七星樓下風雲發泄往來五色壇心水火交騰上下朔旦回旋既未朝昏進退屯䝉陽竒乾位進爻在三十六中隂偶坤宫立象在二十四內方得木中火發土內金生鳥龜噴刮地狂風赤鳯吐燒天猛焰金翁抱嬰兒入户黃婆引姹女臨門周天分布四時中火候還元十二月置壇在後
